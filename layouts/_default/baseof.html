<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }} - {{ .Site.Params.bio }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}
    </title>
    <link rel="stylesheet" href="/style.css?v={{ now.Unix }}">
</head>

<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
        <p>{{ .Site.Params.bio }}</p>
        <nav>
            <a href="/">Home</a> |
            <a href="/projects/">Projects</a> |
            <a href="https://{{ .Site.Params.github }}" target="_blank" rel="noopener noreferrer">GitHub</a> |
            <a href="https://{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a> |
            <a href="mailto:{{ .Site.Params.email }}">Contact</a>
        </nav>
        <hr>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <hr>
        <p>&copy; {{ now.Year }} {{ .Site.Title }}.</p>
    </footer>
</body>

</html>
