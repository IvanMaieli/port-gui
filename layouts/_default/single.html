{{ define "main" }}
<article>

        {{ if ne .Title "Projects" }}
        <p><time datetime="{{ .Date.Format " 2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time></p>
        {{ end }}
    </header>

    <div>
        {{ .Content }}
    </div>
</article>
{{ end }}
